<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Delta Chi – Michigan State University</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    /* COLOR THEME */
    :root {
      --green: #18453B;   /* MSU green */
      --red: #8B0000;     /* Delta Chi red */
      --buff: #D8C690;    /* Buff */
      --white: #ffffff;
    }

    header {
      background: linear-gradient(135deg, var(--green), var(--red));
      color: white;
      text-align: center;
      padding: 70px 20px;
    }

    header h1 {
      font-size: 3rem;
      margin: 0;
    }

    header h2 {
      font-weight: normal;
      margin-top: 10px;
    }

    section {
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h3 {
      color: var(--green);
      border-left: 6px solid var(--red);
      padding-left: 10px;
    }

    .logos {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .logos img {
      height: 90px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

      background: var(--white);
      border-top: 6px solid var(--buff);
